<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentraOps - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      color: #1c1917;
    }
    .card {
      text-align: center;
      max-width: 360px;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #0d9488;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
      color: white;
      font-weight: 700;
    }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { font-size: 14px; color: #78716c; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">S</div>
    <h1>Tidak Ada Koneksi</h1>
    <p>SentraOps membutuhkan koneksi internet untuk memuat halaman ini. Periksa koneksi Anda dan coba lagi.</p>
  </div>
</body>
</html>
